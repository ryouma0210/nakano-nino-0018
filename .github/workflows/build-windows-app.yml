name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - stg
      - production
    paths:
      - "nino-room-windows/**"
      - "shared/**"
      - "habit-diary-timer-mobile/**"
      - ".github/workflows/build-windows-app.yml"

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: nino-room-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            nino-room-windows/package-lock.json
            habit-diary-timer-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm ci
        working-directory: habit-diary-timer-mobile

      - name: Typecheck Windows shell
        run: npm run typecheck

      - name: Typecheck mobile app
        run: npm run typecheck
        working-directory: habit-diary-timer-mobile

      - name: Build Windows application
        run: npm run build:windows

      - name: Select deployment environment
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -eq "production") {
            "DRIVE_FOLDER_ID=11PgZdY2yScfPDu7UWO3MBRzF8-mwRdLX" | Out-File -FilePath $env:GITHUB_ENV -Append
            "DEPLOY_ENV=prd" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "DRIVE_FOLDER_ID=1it-Cj6d5LrjBNNM1FuGIakm23b5b5_4w" | Out-File -FilePath $env:GITHUB_ENV -Append
            "DEPLOY_ENV=stg" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Upload Windows installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nino-${{ github.ref_name }}-windows
          path: nino-room-windows/release/Nino Room Setup 0.1.0.exe
          if-no-files-found: error

      - name: Install rclone
        shell: pwsh
        run: choco install rclone -y --no-progress
        working-directory: .

      - name: Configure Google Drive upload
        shell: pwsh
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.GDRIVE_RCLONE_CONFIG_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RCLONE_CONFIG_BASE64)) {
            throw "GDRIVE_RCLONE_CONFIG_BASE64 is not configured."
          }
          $configDirectory = Join-Path $env:APPDATA "rclone"
          New-Item -ItemType Directory -Force -Path $configDirectory | Out-Null
          $bytes = [Convert]::FromBase64String($env:RCLONE_CONFIG_BASE64)
          [IO.File]::WriteAllBytes((Join-Path $configDirectory "rclone.conf"), $bytes)
        working-directory: .

      - name: Upload Windows installer to Google Drive
        shell: pwsh
        run: |
          rclone copyto "nino-room-windows/release/Nino Room Setup 0.1.0.exe" "gdrive:nino-$env:DEPLOY_ENV-windows-setup.exe" --drive-root-folder-id "$env:DRIVE_FOLDER_ID" --progress
        working-directory: .

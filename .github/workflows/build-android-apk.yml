name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - stg
      - production
    paths:
      - "habit-diary-timer-mobile/**"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: habit-diary-timer-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: habit-diary-timer-mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build standalone release APK
        run: ./gradlew assembleRelease
        working-directory: habit-diary-timer-mobile/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: habit-diary-timer-mobile-${{ github.ref_name }}-apk
          path: habit-diary-timer-mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
        working-directory: .

      - name: Configure Google Drive upload
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.GDRIVE_RCLONE_CONFIG_BASE64 }}
        run: |
          if [ -z "$RCLONE_CONFIG_BASE64" ]; then
            echo "GDRIVE_RCLONE_CONFIG_BASE64 is not configured."
            exit 1
          fi
          mkdir -p "$HOME/.config/rclone"
          echo "$RCLONE_CONFIG_BASE64" | base64 --decode > "$HOME/.config/rclone/rclone.conf"
          chmod 600 "$HOME/.config/rclone/rclone.conf"
        working-directory: .

      - name: Select Google Drive destination
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "production" ]; then
            echo "DRIVE_FOLDER_ID=11PgZdY2yScfPDu7UWO3MBRzF8-mwRdLX" >> "$GITHUB_ENV"
            echo "DEPLOY_ENV=prd" >> "$GITHUB_ENV"
          else
            echo "DRIVE_FOLDER_ID=1it-Cj6d5LrjBNNM1FuGIakm23b5b5_4w" >> "$GITHUB_ENV"
            echo "DEPLOY_ENV=stg" >> "$GITHUB_ENV"
          fi
        working-directory: .

      - name: Upload APK to Google Drive
        shell: bash
        run: |
          APK="habit-diary-timer-mobile/android/app/build/outputs/apk/release/app-release.apk"
          rclone copyto "$APK" "gdrive:nino-${DEPLOY_ENV}.apk" \
            --drive-root-folder-id "$DRIVE_FOLDER_ID" \
            --progress
        working-directory: .

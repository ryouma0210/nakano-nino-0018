name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - stg
      - production
    paths:
      - "habit-diary-timer-mobile/**"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: habit-diary-timer-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: habit-diary-timer-mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: habit-diary-timer-mobile/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: habit-diary-timer-mobile-${{ github.ref_name }}-apk
          path: habit-diary-timer-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
